# Long-lived, immutable caching for static images only.
# Image filenames are stable, so a year-long immutable cache is safe and makes
# repeat visits instant. HTML is intentionally NOT cached here, so page updates
# (and the grid markup) are always served fresh and never go stale.
[[headers]]
  for = "/Images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
