    <script>
      // Lazy, single-request AVIF resolution for grid tiles.
      // Direct static paths only — no Netlify image transforms, no rewrites.
      //
      // Each tile carries its source in data-bg (NOT an inline background-image),
      // so the browser fetches nothing up front. A tile is resolved only when it
      // nears the viewport (IntersectionObserver, generous rootMargin), and each
      // tile commits exactly ONE final background URL:
      //   - AVIF when the browser supports it AND the .avif sibling loads (200).
      //   - the original png/jpg/jpeg/heic otherwise (unsupported or missing).
      // The original is never fetched when AVIF is used, so a tile is never
      // downloaded twice. Above-the-fold tiles intersect immediately, so they
      // resolve with no artificial delay.
      document.addEventListener('DOMContentLoaded', function () {
        var tiles = Array.prototype.slice.call(
          document.querySelectorAll('.grid-item[data-bg]')
        );
        if (!tiles.length) return;

        // AVIF decode support is detected once and cached. Tile resolution waits
        // for this single probe so no tile ever guesses wrong about AVIF.
        var avifSupported = null; // null = unknown; true / false once probed.
        var waiting = [];
        var probe = new Image();
        probe.onload = probe.onerror = function () {
          avifSupported = (probe.width > 0 && probe.height > 0);
          waiting.forEach(function (cb) { cb(); });
          waiting = [];
        };
        probe.src = 'data:image/avif;base64,AAAAIGZ0eXBhdmlmAAAAAGF2aWZtaWYxbWlhZk1BMUIAAADybWV0YQAAAAAAAAAoaGRscgAAAAAAAAAAcGljdAAAAAAAAAAAAAAAAGxpYmF2aWYAAAAADnBpdG0AAAAAAAEAAAAeaWxvYwAAAABEAAABAAEAAAABAAABGgAAAB0AAAAoaWluZgAAAAAAAQAAABppbmZlAgAAAAABAABhdjAxQ29sb3IAAAAAamlwcnAAAABLaXBjbwAAABRpc3BlAAAAAAAAAAEAAAABAAAAEHBpeGkAAAAAAwgICAAAAAxhdjFDgQ0MAAAAABNjb2xybmNseAACAAIABoAAAAAXaXBtYQAAAAAAAAABAAEEAQKDBAAAACVtZGF0EgAKCBgABogQEDQgMgkQAAAAB8dSLfI=';

        function whenAvifKnown(cb) {
          if (avifSupported !== null) cb(); else waiting.push(cb);
        }

        // Commit a freshly built, well-formed url() onto the tile. Writing only
        // backgroundImage never touches background-size or background-position.
        function commit(el, url) {
          el.style.backgroundImage = 'url("' + url + '")';
        }

        function resolveTile(el) {
          // Resolve each tile at most once.
          if (el.dataset.resolved) return;
          el.dataset.resolved = '1';

          var path = (el.dataset.bg || '').trim();
          // Guard: never act on a corrupted value. Reject empty paths and any
          // string carrying the Unicode replacement character (U+FFFD) or
          // control bytes — the exact class of value that produced the
          // /%EF%BF%BD request.
          if (!path || /[\uFFFD\u0000-\u001F]/.test(path)) return;

          whenAvifKnown(function () {
            // Only raster sources that may ship an .avif sibling are upgraded.
            var upgradable = avifSupported && /\.(png|jpe?g|heic)$/i.test(path);
            if (!upgradable) { commit(el, path); return; }

            var avifPath = path.replace(/\.(png|jpe?g|heic)$/i, '.avif');
            // Preflight: commit AVIF only after it loads (no 404) and decodes to
            // real pixels. On any failure the original png/jpg is committed
            // instead, so a tile can never be blanked. The committed url() reuses
            // the just-loaded AVIF from cache — one network fetch per tile.
            var test = new Image();
            test.onload = function () {
              if (test.naturalWidth && test.naturalHeight) commit(el, avifPath);
              else commit(el, path);
            };
            test.onerror = function () { commit(el, path); };
            test.src = avifPath;
          });
        }

        // Lazy-load via IntersectionObserver: above-the-fold tiles intersect
        // right away; offscreen tiles resolve only as they approach the viewport.
        if ('IntersectionObserver' in window) {
          var io = new IntersectionObserver(function (entries) {
            entries.forEach(function (entry) {
              if (entry.isIntersecting) {
                io.unobserve(entry.target);
                resolveTile(entry.target);
              }
            });
          }, { rootMargin: '400px 0px' });
          tiles.forEach(function (el) { io.observe(el); });
        } else {
          // No IntersectionObserver: resolve every tile immediately (safe).
          tiles.forEach(resolveTile);
        }
      });
    </script>
    <script>
      // Tile navigation — independent of the AVIF enhancement above.
      // Only the four labelled selection tiles carry a data-link attribute, so
      // this never touches background images or any other grid tile. Activating
      // a tile (click, or keyboard Enter/Space) navigates to its data-link.
      document.addEventListener('DOMContentLoaded', function () {
        var linkTiles = document.querySelectorAll('.grid-item[data-link]');
        linkTiles.forEach(function (el) {
          function navigate() {
            var dest = el.dataset.link;
            if (dest) window.location.href = dest;
          }
          el.addEventListener('click', navigate);
          el.addEventListener('keydown', function (e) {
            if (e.key === 'Enter' || e.key === ' ' || e.key === 'Spacebar') {
              e.preventDefault(); // stop Space from scrolling the page
              navigate();
            }
          });
        });
      });
    </script>
